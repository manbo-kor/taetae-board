<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaeTae 업무 보드 v15.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.snow.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.min.js"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .ql-container { font-family: inherit; font-size: 14px; border-bottom-left-radius: 0.75rem; border-bottom-right-radius: 0.75rem; }
        .ql-toolbar { border-top-left-radius: 0.75rem; border-top-right-radius: 0.75rem; background-color: #f8fafc; border-color: #e2e8f0 !important; }
        .ql-editor { min-height: 450px; font-size: 0.95rem; line-height: 1.6; font-weight: 400 !important; color: #374151; }
        .view-mode-content { font-weight: 400 !important; color: #374151; }
        .view-mode-content a { color: #2563eb !important; text-decoration: underline !important; cursor: pointer !important; }
        .dragging { opacity: 0.4; border: 2px dashed #3b82f6 !important; }
        .ws-dragging { opacity: 0.4; background-color: #ebf5ff; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 h-screen overflow-hidden font-bold">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const IconWrapper = ({ children, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );
        const Download = (p) => <IconWrapper {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></IconWrapper>;
        const Upload = (p) => <IconWrapper {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></IconWrapper>;
        const SidebarIcon = (p) => <IconWrapper {...p}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><line x1="9" x2="9" y1="3" y2="21"/></IconWrapper>;
        const Search = (p) => <IconWrapper {...p}><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/></IconWrapper>;
        const Edit3 = (p) => <IconWrapper {...p}><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></IconWrapper>;
        const Plus = (p) => <IconWrapper {...p}><path d="M5 12h14M12 5v14"/></IconWrapper>;
        const MapPin = (p) => <IconWrapper {...p}><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></IconWrapper>;

        const linkify = (text) => {
            if (!text) return "";
            const urlPattern = /(((https?:\/\/)|(www\.))[^\s!@#$%^&*()<>]+)/ig;
            return text.replace(urlPattern, (url) => {
                const href = url.startsWith('http') ? url : `http://${url}`;
                return `<a href="${href}" target="_blank" rel="noopener noreferrer">${url}</a>`;
            });
        };

        const stripHtml = (html) => { if (!html) return ''; const tmp = document.createElement("DIV"); tmp.innerHTML = html; return tmp.textContent || tmp.innerText || ""; };
        const INITIAL_COLS = { todo: { id: 'todo', title: '할 일 (To Do)', items: [] }, inProgress: { id: 'inProgress', title: '진행 중 (In Progress)', items: [] }, done: { id: 'done', title: '완료 (Done)', items: [] } };

        const TAG_COLORS = {
            '결제': { bg: 'bg-blue-50', text: 'text-blue-600', border: 'border-blue-100' },
            '긴급': { bg: 'bg-red-50', text: 'text-red-600', border: 'border-red-100' },
            'Study': { bg: 'bg-purple-50', text: 'text-purple-600', border: 'border-purple-100' },
            '뱅킹': { bg: 'bg-green-50', text: 'text-green-600', border: 'border-green-100' },
            '멤버십': { bg: 'bg-yellow-50', text: 'text-yellow-700', border: 'border-yellow-200' },
            '쿠폰': { bg: 'bg-pink-50', text: 'text-pink-600', border: 'border-pink-100' },
            '오더': { bg: 'bg-indigo-50', text: 'text-indigo-600', border: 'border-indigo-100' },
            'CPC': { bg: 'bg-orange-50', text: 'text-orange-600', border: 'border-orange-100' },
        };
        const getTagStyle = (tagName) => TAG_COLORS[tagName] || { bg: 'bg-gray-50', text: 'text-gray-500', border: 'border-gray-200' };

        const QuillEditor = ({ value, onChange }) => {
            const ref = useRef(null); const quill = useRef(null);
            useEffect(() => {
                if (ref.current && !quill.current) {
                    quill.current = new Quill(ref.current, { theme: 'snow', modules: { toolbar: [['bold', 'italic', 'underline'], [{list:'ordered'}, {list:'bullet'}], ['link', 'image']] } });
                    quill.current.on('text-change', () => onChange(quill.current.root.innerHTML));
                }
                if (quill.current && value !== quill.current.root.innerHTML) quill.current.root.innerHTML = value || '';
            }, []);
            return <div ref={ref} style={{ height: '100%' }} />;
        };

        const App = () => {
            const STORAGE_KEY = 'manbo_v15_db';
            const [workspaces, setWorkspaces] = useState(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                return saved ? JSON.parse(saved) : [{ id: 'ws1', title: '기본 공간', data: JSON.parse(JSON.stringify(INITIAL_COLS)) }];
            });
            const [activeWsId, setActiveWsId] = useState(workspaces[0].id);
            const activeWs = workspaces.find(w => w.id === activeWsId) || workspaces[0];
            const [isSidebarOpen, setIsSidebarOpen] = useState(true);
            const [expandedSections, setExpandedSections] = useState({ todo: true, inProgress: true, done: true });
            const [searchQuery, setSearchQuery] = useState('');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingTask, setEditingTask] = useState(null);
            const [isViewMode, setIsViewMode] = useState(true);
            const [form, setForm] = useState({ title: '', content: '', date: '', tag: '', image: '', status: 'todo', targetWsId: '' });
            const [draggedItem, setDraggedItem] = useState(null);
            const fileInputRef = useRef(null);
            const SUGGESTED_TAGS = ['결제', '쿠폰', '멤버십', '뱅킹', 'Study', '긴급', '오더', 'CPC'];

            useEffect(() => { localStorage.setItem(STORAGE_KEY, JSON.stringify(workspaces)); }, [workspaces]);

            const handleImport = (e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const imported = JSON.parse(ev.target.result);
                        setWorkspaces(Array.isArray(imported) ? imported : [imported]);
                        alert('데이터 복구 성공!');
                    } catch (err) { alert('파일 읽기 실패'); }
                };
                reader.readAsText(file); e.target.value = '';
            };

            const openModal = (colId, task = null) => {
                if (task) {
                    setEditingTask({ ...task, originalColId: colId });
                    setForm({ ...task, status: colId, targetWsId: activeWsId });
                    setIsViewMode(true);
                } else {
                    setEditingTask(null);
                    setForm({ title: '', content: '', date: new Date().toISOString().split('T')[0], tag: '', image: '', status: colId, targetWsId: activeWsId });
                    setIsViewMode(false);
                }
                setIsModalOpen(true);
            };

            const handleSave = () => {
                if (!form.title.trim()) { alert('업무 제목을 입력해주세요!'); return; }
                const linkedContent = linkify(form.content);
                const taskObj = { id: editingTask?.id || Date.now().toString(), title: form.title, content: linkedContent, date: form.date, tag: form.tag, image: form.image };
                let nextWorkspaces = JSON.parse(JSON.stringify(workspaces));
                if (editingTask) {
                    nextWorkspaces = nextWorkspaces.map(ws => ws.id === activeWsId ? { ...ws, data: { ...ws.data, [editingTask.originalColId]: { ...ws.data[editingTask.originalColId], items: ws.data[editingTask.originalColId].items.filter(i => i.id !== editingTask.id) } } } : ws);
                }
                nextWorkspaces = nextWorkspaces.map(ws => ws.id === form.targetWsId ? { ...ws, data: { ...ws.data, [form.status]: { ...ws.data[form.status], items: [...ws.data[form.status].items, taskObj] } } } : ws);
                setWorkspaces(nextWorkspaces); setIsModalOpen(false);
            };

            const filterTask = (task) => {
                const q = searchQuery.toLowerCase().trim();
                return task.title.toLowerCase().includes(q) || stripHtml(task.content).toLowerCase().includes(q);
            };

            const toggleTag = (tagName) => {
                const currentTags = form.tag.split(/[,\s]+/).filter(t => t.trim());
                if (currentTags.includes(tagName)) {
                    const nextTags = currentTags.filter(t => t !== tagName);
                    setForm(p => ({ ...p, tag: nextTags.join(', ') }));
                } else {
                    const nextTagStr = form.tag.trim() ? `${form.tag.trim()}, ${tagName}` : tagName;
                    setForm(p => ({ ...p, tag: nextTagStr }));
                }
            };

            return (
                <div className="h-screen flex flex-col font-bold">
                    <nav className="bg-white border-b px-6 py-3 flex justify-between items-center z-20 shadow-sm shrink-0">
                        <div className="flex items-center gap-3">
                            <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-1.5 rounded hover:bg-gray-100 transition-colors font-bold"><SidebarIcon size={20} /></button>
                            <h1 className="text-xl text-gray-800 tracking-tight font-black">TaeTae Board v15.3</h1>
                            <div className="relative flex items-center ml-2">
                                <input type="text" value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} placeholder="검색..." className="pl-9 pr-4 py-1.5 rounded-full border bg-gray-50 text-sm focus:outline-none w-64 font-bold" />
                                <Search size={14} className="absolute left-3 text-gray-400" />
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            <input type="file" ref={fileInputRef} onChange={handleImport} className="hidden" accept=".json" />
                            <button onClick={() => fileInputRef.current.click()} className="flex items-center gap-1 text-sm text-gray-600 hover:text-blue-600 px-3 py-1.5 rounded hover:bg-blue-50 transition-colors font-black font-bold"><Upload size={16} /> 복구</button>
                            <button onClick={() => {
                                const dateStr = new Date().toISOString().split('T')[0];
                                const b=new Blob([JSON.stringify(workspaces)],{type:"application/json"}); 
                                const u=URL.createObjectURL(b); const a=document.createElement('a'); 
                                a.href=u; a.download=`manbo_backup_${dateStr}.json`; a.click();
                            }} className="flex items-center gap-1 text-sm text-gray-600 hover:text-green-600 px-3 py-1.5 rounded hover:bg-green-50 transition-colors font-black font-bold"><Download size={16} /> 백업 </button>
                        </div>
                    </nav>

                    <div className="flex flex-1 overflow-hidden">
                        {isSidebarOpen && (
                            <aside className="w-64 bg-white border-r flex flex-col shrink-0 font-bold">
                                <div className="p-4 border-b bg-gray-50 flex justify-between items-center text-xs text-gray-400 uppercase tracking-widest font-black">
                                    <span>공간 리스트</span>
                                    <button onClick={() => {const n=prompt("이름:"); if(n) setWorkspaces([...workspaces,{id:Date.now().toString(),title:n,data:JSON.parse(JSON.stringify(INITIAL_COLS))}])}} className="text-blue-600 text-lg">＋</button>
                                </div>
                                <div className="p-2 space-y-1 border-b overflow-y-auto max-h-[35%]">
                                    {workspaces.map((ws, index) => (
                                        <div 
                                            key={ws.id} 
                                            draggable
                                            onDragStart={(e) => {
                                                e.dataTransfer.setData("wsIndex", index);
                                                e.currentTarget.classList.add('ws-dragging');
                                            }}
                                            onDragEnd={(e) => {
                                                e.currentTarget.classList.remove('ws-dragging');
                                            }}
                                            onDragOver={(e) => e.preventDefault()}
                                            onDrop={(e) => {
                                                e.preventDefault();
                                                const fromIdx = e.dataTransfer.getData("wsIndex");
                                                if (fromIdx === "" || fromIdx === index.toString()) return;
                                                const newWs = [...workspaces];
                                                const [moved] = newWs.splice(parseInt(fromIdx), 1);
                                                newWs.splice(index, 0, moved);
                                                setWorkspaces(newWs);
                                            }}
                                            onClick={() => setActiveWsId(ws.id)} 
                                            className={`group flex justify-between items-center px-4 py-3 rounded-xl cursor-grab active:cursor-grabbing transition-all ${activeWsId === ws.id ? 'bg-blue-600 text-white shadow-md' : 'hover:bg-gray-100 text-gray-600'}`}
                                        >
                                            <span className="text-sm truncate font-black font-bold">{ws.title || "이름 없는 공간"}</span>
                                            <div className="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                                <button onClick={(e) => {e.stopPropagation(); const n=prompt("수정",ws.title); if(n) setWorkspaces(p=>p.map(w=>w.id===ws.id?{...w,title:n}:w))}} className="p-1 hover:text-yellow-300 font-bold"><Edit3 size={14}/></button>
                                                <button onClick={(e) => {e.stopPropagation(); if(workspaces.length>1 && confirm("삭제하시겠습니까?")) {const f=workspaces.filter(w=>w.id!==ws.id); setWorkspaces(f); setActiveWsId(f[0].id)}}} className="p-1 hover:text-red-400 font-mono font-bold">✕</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="p-4 border-b bg-gray-50 text-gray-500 text-sm font-black">업무 리스트</div>
                                <div className="flex-1 overflow-y-auto p-2 space-y-2 bg-gray-50/30">
                                    {Object.values(activeWs.data).map(col => {
                                        const items = col.items.filter(filterTask);
                                        const headerStyle = col.id === 'todo' ? { backgroundColor: '#fef2f2', color: '#b91c1c' } : col.id === 'inProgress' ? { backgroundColor: '#fefce8', color: '#a16207' } : { backgroundColor: '#f0fdf4', color: '#15803d' };
                                        return (
                                            <div key={col.id} className="border border-gray-200 rounded-lg overflow-hidden bg-white shadow-sm">
                                                <div onClick={() => setExpandedSections(p=>({...p,[col.id]:!p[col.id]}))} style={headerStyle} className="text-[11px] px-3 py-2 cursor-pointer flex items-center justify-between">
                                                    <div>{col.title.split('(')[0]}</div>
                                                    <span className="bg-white/70 px-1.5 rounded-full text-[10px] font-bold">{items.length}</span>
                                                </div>
                                                {expandedSections[col.id] && (
                                                    <ul className="p-1 space-y-0.5 bg-white text-[12px] text-gray-600">
                                                        {items.map(task => (
                                                            <li key={task.id} onClick={() => openModal(col.id, task)} className="px-2 py-1.5 hover:bg-gray-100 rounded cursor-pointer truncate pl-6 flex items-center gap-2 font-bold">• {task.title}</li>
                                                        ))}
                                                    </ul>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </aside>
                        )}

                        <main className="flex-1 bg-gray-100/50 p-6 overflow-hidden">
                            <div className="flex h-full gap-6">
                                {Object.values(activeWs.data).map((col) => {
                                    const items = col.items.filter(filterTask);
                                    return (
                                        <div 
                                            key={col.id} 
                                            onDragOver={(e) => e.preventDefault()} 
                                            onDrop={(e) => {
                                                e.preventDefault();
                                                if(!draggedItem) return;
                                                const newCols = JSON.parse(JSON.stringify(activeWs.data));
                                                // 1. 기존 위치 제거
                                                newCols[draggedItem.colId].items = newCols[draggedItem.colId].items.filter(i => i.id !== draggedItem.task.id);
                                                
                                                // 2. 끼워넣을 위치 계산
                                                const container = e.currentTarget.querySelector('.task-list-container');
                                                const draggableEls = [...container.querySelectorAll('.task-card:not(.dragging)')];
                                                const afterEl = draggableEls.reduce((closest, child) => {
                                                    const box = child.getBoundingClientRect();
                                                    const offset = e.clientY - box.top - box.height / 2;
                                                    if (offset < 0 && offset > closest.offset) return { offset: offset, element: child };
                                                    else return closest;
                                                }, { offset: Number.NEGATIVE_INFINITY }).element;

                                                const targetIdx = afterEl 
                                                    ? newCols[col.id].items.findIndex(i => i.id === afterEl.getAttribute('data-id'))
                                                    : newCols[col.id].items.length;

                                                // 3. 삽입
                                                newCols[col.id].items.splice(targetIdx, 0, draggedItem.task);
                                                setWorkspaces(workspaces.map(w => w.id === activeWsId ? {...w, data: newCols} : w));
                                            }}
                                            className="flex-1 flex flex-col bg-gray-50 rounded-xl shadow-sm border border-gray-200 h-full overflow-hidden"
                                        >
                                            <div className="p-3 border-b flex justify-between items-center sticky top-0 z-10" style={col.id === 'todo' ? { backgroundColor: 'rgba(254, 242, 242, 0.7)', color: '#b91c1c' } : col.id === 'inProgress' ? { backgroundColor: 'rgba(254, 252, 232, 0.7)', color: '#a16207' } : { backgroundColor: 'rgba(240, 253, 244, 0.7)', color: '#15803d' }}>
                                                <div className="flex items-center gap-2">
                                                    <span className="text-sm px-2 py-0.5 bg-white rounded border border-black/5 font-black text-gray-700">{items.length}</span>
                                                    <h2 className="text-base font-bold">{col.title}</h2>
                                                </div>
                                                <button onClick={() => openModal(col.id)} className="hover:rotate-90 transition-transform"><Plus size={18}/></button>
                                            </div>
                                            <div className="task-list-container flex-1 overflow-y-auto p-3 space-y-3 font-normal text-gray-700">
                                                {items.map((task) => (
                                                    <div 
                                                        key={task.id} 
                                                        data-id={task.id}
                                                        draggable 
                                                        onDragStart={() => {
                                                            setDraggedItem({colId:col.id, task});
                                                            setTimeout(() => document.querySelector(`[data-id="${task.id}"]`).classList.add('dragging'), 0);
                                                        }} 
                                                        onDragEnd={() => {
                                                            setDraggedItem(null);
                                                            document.querySelectorAll('.task-card').forEach(el => el.classList.remove('dragging'));
                                                        }} 
                                                        onClick={() => openModal(col.id, task)} 
                                                        className="task-card bg-white rounded-lg border border-gray-200 p-4 shadow-sm hover:border-blue-300 transition-all cursor-grab active:cursor-grabbing group"
                                                    >
                                                        <div className="flex justify-between items-center mb-2 font-black text-[10px]">
                                                            <div className="flex flex-wrap gap-1">
                                                                {task.tag.split(/[,\s]+/).filter(t => t.trim()).map((t, i) => {
                                                                    const s = getTagStyle(t);
                                                                    return <span key={i} className={`px-2 py-0.5 rounded-full border ${s.bg} ${s.text} ${s.border}`}>{t}</span>;
                                                                })}
                                                            </div>
                                                            <span className="text-gray-400">{task.date}</span>
                                                        </div>
                                                        <h3 className="text-sm text-gray-800 font-black leading-tight group-hover:text-blue-600 mb-1">{task.title}</h3>
                                                        <div className="text-[11px] text-gray-400 line-clamp-1">{stripHtml(task.content)}</div>
                                                    </div>
                                                ))}
                                                <button onClick={() => openModal(col.id)} className="w-full py-3 bg-white border border-gray-100 rounded-xl text-gray-400 hover:text-blue-500 shadow-sm transition-all flex justify-center items-center gap-2 text-sm">+ 새 업무 추가</button>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </main>
                    </div>

                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-2xl shadow-2xl w-[1200px] h-[92vh] flex flex-col overflow-hidden text-gray-700">
                                <div className="px-8 py-3 border-b flex justify-between bg-gray-50/50 items-center shrink-0">
                                    <div className="flex items-center gap-6">
                                        <select value={form.status} onChange={e=>setForm({...form, status: e.target.value})} className="border-2 rounded-lg px-2 py-1 bg-white outline-none focus:border-blue-500 font-black text-sm">
                                            <option value="todo">할 일</option><option value="inProgress">진행 중</option><option value="done">완료</option>
                                        </select>
                                        <div className="flex items-center gap-2 text-blue-600 font-black text-sm bg-blue-50 px-3 py-1 rounded-lg border border-blue-100 shadow-sm">
                                            <MapPin size={14}/>
                                            <span>공간 이동:</span>
                                            <select value={form.targetWsId} onChange={e=>setForm({...form, targetWsId: e.target.value})} className="bg-transparent text-blue-600 outline-none cursor-pointer">
                                                {workspaces.map(ws => <option key={ws.id} value={ws.id}>{ws.title}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    <button onClick={()=>setIsModalOpen(false)} className="text-2xl text-gray-400 hover:text-gray-600 font-normal">✕</button>
                                </div>
                                <div className="flex-1 p-8 flex flex-col gap-4 overflow-hidden">
                                    <input type="text" value={form.title} onChange={e=>setForm(p=>({...p, title:e.target.value}))} placeholder="제목을 입력하세요" className="text-xl font-black border-b-2 outline-none pb-2 focus:border-blue-500 transition-colors border-transparent" />
                                    <div className="grid grid-cols-2 gap-8 shrink-0">
                                        <div className="space-y-3">
                                            <div className="grid grid-cols-2 gap-4">
                                                <div className="space-y-1 font-bold"><label className="text-[11px] text-gray-400 uppercase font-bold">마감일</label><input type="date" value={form.date} onChange={e=>setForm(p=>({...p, date: e.target.value}))} className="w-full bg-white border border-gray-200 px-3 py-1.5 rounded-lg text-sm outline-none font-bold" /></div>
                                                <div className="space-y-1 font-bold"><label className="text-[11px] text-gray-400 uppercase font-black font-bold">태그 (쉼표 구분)</label><input type="text" value={form.tag} onChange={e=>setForm(p=>({...p, tag: e.target.value}))} className="w-full bg-white border border-gray-200 px-3 py-1.5 rounded-lg text-sm outline-none font-bold" /></div>
                                            </div>
                                            <div className="flex flex-wrap gap-2">
                                                {SUGGESTED_TAGS.map(t => (
                                                    <button key={t} onClick={() => toggleTag(t)} className={`text-[10px] px-2 py-1 rounded border transition-colors ${form.tag.split(/[,\s]+/).includes(t) ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-gray-500 hover:bg-gray-100 border-gray-200'} font-bold`}>#{t}</button>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="space-y-1 font-black">
                                            <label className="text-[11px] text-gray-400 uppercase font-bold">이미지 URL</label>
                                            <input type="text" value={form.image} onChange={e=>setForm(p=>({...p, image: e.target.value}))} placeholder="https://..." className="w-full bg-white border border-gray-200 px-3 py-1.5 rounded-lg text-sm outline-none font-bold" />
                                        </div>
                                    </div>
                                    <div className="flex-1 flex flex-col min-h-0">
                                        <div className="flex justify-between items-center mb-2 px-1 font-black">
                                            <label className="text-[11px] text-gray-400 uppercase tracking-widest font-black">상세 업무 내용 (URL 자동 링크)</label>
                                            {editingTask && <button onClick={()=>setIsViewMode(!isViewMode)} className={`text-[11px] px-3 py-1 rounded-lg border font-bold transition-all ${isViewMode ? 'bg-blue-50 text-blue-600 border-blue-200 shadow-sm' : 'bg-gray-100 text-gray-600 border-gray-200'} font-bold`}>{isViewMode ? "수정모드" : "보기모드"}</button>}
                                        </div>
                                        <div className="flex-1 bg-white border-2 border-gray-100 rounded-xl overflow-hidden shadow-inner font-normal">
                                            {isViewMode && editingTask ? (
                                                <div 
                                                    className="p-8 ql-editor view-mode view-mode-content h-full overflow-y-auto font-normal text-gray-700" 
                                                    dangerouslySetInnerHTML={{__html: form.content || '내용 없음'}} 
                                                    onClick={(e) => { if(e.target.tagName === 'A') { window.open(e.target.href, '_blank'); e.preventDefault(); } }}
                                                />
                                            ) : (
                                                <QuillEditor value={form.content} onChange={v=>setForm(p=>({...p, content: v}))}/>
                                            )}
                                        </div>
                                    </div>
                                </div>
                                <div className="px-8 py-4 border-t bg-gray-50 flex justify-end gap-4 shrink-0 font-black">
                                    {editingTask && <button onClick={()=>{if(confirm('삭제?')){const n=workspaces.map(ws=>ws.id===activeWsId?{...ws,data:{...ws.data,[editingTask.originalColId]:{...ws.data[editingTask.originalColId],items:ws.data[editingTask.originalColId].items.filter(i=>i.id !== editingTask.id)}}}:ws); setWorkspaces(n); setIsModalOpen(false);}}} className="text-red-500 mr-auto hover:bg-red-50 px-4 py-2 rounded-xl text-sm font-black">삭제</button>}
                                    <button onClick={()=>setIsModalOpen(false)} className="px-6 py-2 text-gray-500 hover:bg-gray-200 rounded-xl text-sm font-black">닫기</button>
                                    <button onClick={handleSave} className="px-12 py-2 bg-blue-600 text-white rounded-xl shadow-lg hover:bg-blue-700 transition-all text-base font-black">업무 저장</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
